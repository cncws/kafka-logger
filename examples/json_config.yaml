# dictConfig 示例配置
version: 1
filters:
  host_injector: # 添加 host
    (): kafka_logger.filters.HostInjectFilter
    bind_key: host
  traceid_injector: # 添加 trace id
    (): kafka_logger.filters.TraceIdInjectFilter
    bind_key: trace_id
formatters:
  json:
    (): pythonjsonlogger.json.JsonFormatter # 使用 python-json-logger 支持 json 格式日志
    .: # 应用到实例的属性
      default_time_format: "%Y-%m-%d %H:%M:%S"
      default_msec_format: "%s.%03d" # 毫秒格式，%s 会被替换为日期
    # 其他参数会传给 handler 的构造函数
    fmt: asctime,levelname,name,lineno,message,exc_info,host,trace_id,appname,env
    style: ","
    static_fields: # 固定字段
      env: dev
      appname: my-app
    rename_fields: # 重命名字段的 key
      name: loggername
handlers:
  console_json:
    class: logging.StreamHandler
    filters: [host_injector, traceid_injector] # 注入动态属性
    formatter: json
    level: DEBUG
    stream: ext://sys.stdout
loggers:
  app:
    handlers: [console_json]
    propagate: false
    level: DEBUG
