# dictConfig 示例配置
version: 1
formatters:
  colorful:
    (): colorlog.ColoredFormatter
    fmt: "%(log_color)s[%(levelname)1.1s %(asctime)s]%(reset)s %(name)s:%(lineno)d %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
handlers:
  console:
    class: logging.StreamHandler
    formatter: colorful
    level: DEBUG
    stream: ext://sys.stdout
loggers:
  app:
    handlers: [console]
    propagate: false
    level: DEBUG
