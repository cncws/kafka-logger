# dictConfig 示例配置
version: 1
formatters:
  colorful:
    (): logzero.LogFormatter # 使用 logzero 支持控制台彩色日志
    color: true
    fmt: "%(color)s[%(levelname)1.1s %(asctime)s]%(end_color)s %(name)s:%(lineno)d %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
handlers:
  console:
    class: logging.StreamHandler
    formatter: colorful
    level: DEBUG
    stream: ext://sys.stdout
loggers:
  app:
    handlers: [console]
    propagate: false
    level: DEBUG
