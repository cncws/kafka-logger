# Kafka Logger 默认配置
kafka_logger:
  # Kafka broker 地址列表
  bootstrap_servers:
    - localhost:9092

  # 日志发送的目标 topic
  topic: app-logs

  # Kafka Producer 额外配置 (传递给 KafkaProducer)
  # See: https://kafka-python.readthedocs.io/en/master/apidoc/KafkaProducer.html
  kafka_extra:
    client_id: kafka-logger

    # acks 确认模式:
    #   0 - 不等待确认（最快，可能丢失）
    #   1 - 等待 leader 确认（推荐）
    #   all - 等待所有副本确认（最安全，最慢）
    acks: 0

    # 失败重试次数（日志场景建议不重试，避免阻塞）
    retries: 0

    # 批量发送优化：等待时间（ms）
    linger_ms: 10

    # 批次大小（字节）
    batch_size: 16384

    # 压缩类型: none, gzip, snappy, lz4, zstd
    compression_type: lz4

  # 日志级别 (DEBUG, INFO, WARNING, ERROR, CRITICAL)
  # 注意：setup_kafka_logger() 方法中的 level 参数已废弃，建议使用此配置项
  level: INFO

  # 日志格式化配置
  formatter:
    # 时间格式
    default_time_format: "%Y-%m-%d %H:%M:%S"
    default_msec_format: "%s.%03d"

    # 输出字段配置
    fields:
      # 时间戳
      - name: asctime
        rename: timestamp

      # 日志级别 (DEBUG, INFO, WARNING, ERROR, CRITICAL)
      - name: levelname

      # Logger 名称
      - name: name
        rename: loggername

      # 模块名
      - name: module
        rename: modulename

      # 函数名
      - name: funcName
        rename: funcname

      # 行号
      - name: lineno

      # 日志消息
      - name: message

      # 异常堆栈
      - name: exc_info
        rename: stacktrace

      # 主机 IP (初始化时获取)
      - name: host
        static_factory: builtin:get_host_ip

      # Trace ID (每次日志动态获取)
      - name: traceid
        dynamic_factory: builtin:get_trace_id

      # 线程名
      - name: threadName
        rename: threadname

      # 应用名（静态值，需自行修改）
      - name: appname
        static: my-app

      # 环境标识（静态值，需自行修改）
      - name: env
        static: dev
